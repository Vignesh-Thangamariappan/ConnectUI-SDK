name: Monitor Core Releases

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Latest Core Release
        id: core
        run: |
          # Fetch latest release from the core repo
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/Vignesh-Thangamariappan/ConnectUI-CMP/releases/latest | jq -r .tag_name)
          echo "LATEST_RELEASE: $LATEST_RELEASE"
          
          # Standardize to remove 'v' for comparison
          CORE_VER="${LATEST_RELEASE#v}"
          echo "CORE_VER: $CORE_VER"
          echo "tag=$CORE_VER" >> $GITHUB_OUTPUT
          
          # Get the current SDK version from VERSION file
          SDK_VER=$(cat VERSION | tr -d '[:space:]')
          echo "SDK_VER: $SDK_VER"
          echo "current=$SDK_VER" >> $GITHUB_OUTPUT

      - name: Sync and Release
        if: steps.core.outputs.tag != steps.core.outputs.current
        run: |
          CORE_VER="${{ steps.core.outputs.tag }}"
          TAG="v${CORE_VER}"
          URL="https://github.com/Vignesh-Thangamariappan/ConnectUI-CMP/releases/download/${TAG}/CMPUI.xcframework.zip"
          
          echo "New version detected: $TAG"
          echo "Downloading from: $URL"
          
          # Download and compute checksum
          curl -L -o CMPUI.xcframework.zip "$URL"
          if [ ! -f CMPUI.xcframework.zip ]; then
            echo "Failed to download asset"
            exit 1
          fi
          
          CHECKSUM=$(swift package compute-checksum CMPUI.xcframework.zip)
          echo "New Checksum: $CHECKSUM"
          
          # Update Package.swift (Using perl for cross-platform compatibility or just standard sed on ubuntu)
          sed -i "s|url: \"https://github.com/Vignesh-Thangamariappan/ConnectUI-CMP/releases/download/.*/CMPUI.xcframework.zip\"|url: \"$URL\"|g" Package.swift
          sed -i "s|checksum: \".*\"|checksum: \"$CHECKSUM\"|g" Package.swift
          
          # Update VERSION file
          echo "$CORE_VER" > VERSION
          
          # Commit and Push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift VERSION
          git commit -m "Automated sync to core version ${TAG} [sync skip]"
          git push origin main
          
          # Push tag (triggers release.yml)
          git tag ${TAG}
          git push origin ${TAG}
