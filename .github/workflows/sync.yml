name: Sync with Core

on:
  repository_dispatch:
    types: [core_release]

jobs:
  update-package:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Package.swift and VERSION
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          CLEAN_TAG="${TAG#v}" # Remove 'v' prefix if present
          CHECKSUM="${{ github.event.client_payload.checksum }}"
          URL="https://github.com/Vignesh-Thangamariappan/ConnectUI-CMP/releases/download/${TAG}/CMPUI.xcframework.zip"
          
          # Update URL (Note: The repo name might still be ConnectUI-CMP or have changed, 
          # but the user specified CMPUI.xcframework.zip in artifacts)
          sed -i '' "s|url: \"https://github.com/Vignesh-Thangamariappan/ConnectUI-CMP/releases/download/.*/CMPUI.xcframework.zip\"|url: \"$URL\"|g" Package.swift
          
          # Update Checksum
          sed -i '' "s|checksum: \".*\"|checksum: \"$CHECKSUM\"|g" Package.swift
          
          # Update VERSION file
          echo "$CLEAN_TAG" > VERSION

      - name: Commit and Push
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift VERSION
          git commit -m "Update to version ${TAG}"
          git push origin main
          
          # Create and push tag
          git tag ${TAG}
          git push origin ${TAG}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.client_payload.tag }}
          name: ${{ github.event.client_payload.tag }}
          body: "Automated sync with CMPUI-CMP core release ${{ github.event.client_payload.tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
